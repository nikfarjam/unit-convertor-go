name: Release Unit Converter API

env:
    GO_VERSION: "1.26.4"

on:
    push:
        branches:
            - main
            - develop

jobs:
    set-ci-variables:
        runs-on: ubuntu-latest
        outputs:
            API_VERSION: ${{ steps.set-env.outputs.API_VERSION }}
            IMAGE_TAG: ${{ steps.set-env.outputs.IMAGE_TAG }}
        steps:
            - uses: actions/checkout@v6
            - name: Set Pipeline environment variables
              id: set-env
              shell: bash
              run: |
                  image_name="${{ vars.DOCKER_HUB_REPOSITORY }}/unit-converter-api-lightweight"
                  api_version="$(cat version)"
                  if [[ "${GITHUB_REF}" == refs/heads/develop ]]; then
                    image_tag="${image_name}:${api_version}-beta"
                  elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
                    image_tag="${image_name}:${api_version}"
                  else
                    image_tag="${image_name}:test"
                  fi
                  echo "API_VERSION=${api_version}" >> $GITHUB_OUTPUT
                  echo "IMAGE_TAG=${image_tag}" >> $GITHUB_OUTPUT

    docker-build-image:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      archSuffix: amd64
                    - os: ubuntu-24.04-arm
                      archSuffix: arm64
        runs-on: ${{ matrix.os }}
        needs: ["set-ci-variables"]
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Build and push Docker image
              id: build
              shell: bash
              run: |
                  make build-image IMAGE_TAG=${{ needs.set-ci-variables.outputs.IMAGE_TAG }}-${{ matrix.archSuffix }}
                  docker push ${{ needs.set-ci-variables.outputs.IMAGE_TAG }}-${{ matrix.archSuffix }}

    create-manifest:
        runs-on: ubuntu-latest
        needs: ["docker-build-image", "set-ci-variables"]
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Create and push multi-arch manifest
              shell: bash
              run: |
                  tag="${{ needs.set-ci-variables.outputs.IMAGE_TAG }}"
                  if [[ -z "$tag" ]]; then
                    echo "ERROR: IMAGE_TAG output is empty. Ensure set-ci-variables job ran and produced IMAGE_TAG." >&2
                    exit 1
                  fi
                  docker manifest create "${tag}" \
                    "${tag}-amd64" \
                    "${tag}-arm64"
                  docker manifest push "${tag}"

    tag-branch:
        runs-on: ubuntu-latest
        needs: ["set-ci-variables"]
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
            - name: Tag branch
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  api_version="${{ needs.set-ci-variables.outputs.API_VERSION }}"
                  git fetch --tags
                  if git rev-parse "origin/${api_version}" >/dev/null 2>&1 || git ls-remote --tags origin | grep "refs/tags/${api_version}" >/dev/null; then
                    echo "Tag ${api_version} already exists on remote. Skipping tag creation and push."
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "${api_version}"
                  git push origin "${api_version}"
            - name: Create GitHub Release
              uses: actions/create-release@v1
              with:
                  tag_name: ${{ needs.set-ci-variables.outputs.API_VERSION }}
                  release_name: "Release ${{ needs.set-ci-variables.outputs.API_VERSION }}"
                  body: "Release ${{ needs.set-ci-variables.outputs.API_VERSION }} created by workflow."
                  draft: false
                  prerelease: false
