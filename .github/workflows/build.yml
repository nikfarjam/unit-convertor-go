name: Lint, Test and Build Unit Converter API

env:
    GO_VERSION: "1.26.4"

on:
    pull_request:
    push:

jobs:
    code-quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "${{ env.GO_VERSION }}"
                  cache: "true"
            - name: Lint
              run: make lint
            - name: Test
              run: |
                  make coverage-ci
                  make coverage-codecov
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "${{ env.GO_VERSION }}"
                  cache: "true"
            - name: Build
              run: make build
